[build]
  publish = "."

# Long-lived caching for static assets
# NOTE: Cache-Control: immutable requires filename versioning for future updates.
# If JS/CSS files are updated without renaming, users with cached copies will not
# see changes. Either rename the files or remove the immutable directive before
# deploying significant updates.

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; font-src https://fonts.gstatic.com; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://fonts.googleapis.com"
    Permissions-Policy = "camera=(), geolocation=(), microphone=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
